<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltCode.pl - Profesjonalne Pluginy, Skrypty i Discord</title>
    <!-- Czcionka Inter dla nowoczesnego wyglądu -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070c;
            --card-bg: #0c1322;
            --accent-blue: #0084ff;
            --accent-yellow: #ffd000;
            --accent-orange: #ff5100;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --discord-color: #5865F2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Płynne przewijanie strony */
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Nawigacja */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(5, 7, 12, 0.85);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            height: 45px; /* Wysokość logo w menu */
            width: auto;
            object-fit: contain;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-yellow), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--text-main);
        }

        /* Sekcja Główna (Hero) */
        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle at center, rgba(0, 132, 255, 0.08) 0%, rgba(255, 81, 0, 0.03) 50%, transparent 70%);
            margin-top: 40px;
        }

        /* Klikalne duże logo na środku */
        .hero-logo-link {
            display: inline-block;
            margin-bottom: 25px;
            text-decoration: none;
        }

        .hero-logo {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(255, 208, 0, 0.2));
            animation: float 4s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        header h1 span {
            background: linear-gradient(to right, var(--accent-yellow), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
        }

        /* Przyciski */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-discord {
            background-color: var(--discord-color);
            color: white;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .btn-discord:hover {
            background-color: #4752c4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
        }

        /* Sekcja: Co robimy */
        .section {
            padding: 100px 8%;
            text-align: center;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 50px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: transform 0.3s, border-color 0.3s;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 132, 255, 0.2);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Sekcja: Informacje i Statystyki */
        .stats-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 40px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 16px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.01);
        }

        .stat-item h2 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .stat-item p {
            color: var(--text-muted);
        }

        /* Stopka */
        footer {
            padding: 40px 8%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* RWD - Dostosowanie do telefonów */
        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
            .stats-container { flex-direction: column; }
            .hero-logo { width: 130px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#top" class="logo-container">
            <!-- POPRAWIONA NAZWA PLIKU Z WIELKICH LITER -->
            <img src="VoltCode.png" alt="VoltCode Logo" class="logo-img">
            <span class="logo-text">VoltCode</span>
        </a>
        <ul class="nav-links">
            <li><a href="#co-robimy">Co robimy</a></li>
            <li><a href="#o-nas">O nas</a></li>
            <li><a href="#kontakt">Kontakt</a></li>
        </ul>
    </nav>

    <!-- Sekcja Główna -->
    <header id="top">
        <a href="#top" class="hero-logo-link">

            <img src="VoltCode.png" alt="VoltCode Duże Logo" class="hero-logo">
        </a>

        <div class="services-grid">
            <div class="card">
                <span class="card-icon" style="color: var(--accent-blue);">⚙️</span>
